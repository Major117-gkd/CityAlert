<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    {% load static %}
    <title>Récupération | CityAlert Intelligence</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <style>
        :root {
            --accent: #00f0ff;
            --accent-glow: rgba(0, 240, 255, 0.4);
            --bg: #030712;
            --card-bg: rgba(15, 23, 42, 0.65);
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --border: rgba(255, 255, 255, 0.05);
            --error: #fb7185;
            --success: #10b981;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        .mesh-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: 
                radial-gradient(at 50% 0%, hsla(180, 100%, 50%, 0.05) 0px, transparent 50%),
                radial-gradient(at 50% 100%, hsla(210, 100%, 50%, 0.05) 0px, transparent 50%);
            z-index: -1;
        }

        .login-card {
            width: 100%;
            max-width: 400px;
            padding: 1.75rem 2rem;
            background: var(--card-bg);
            -webkit-backdrop-filter: blur(24px);
            backdrop-filter: blur(24px);
            border: 1px solid var(--border);
            border-radius: 28px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .header { text-align: center; margin-bottom: 1.25rem; }
        .logo-icon { 
            font-size: 2rem; 
            color: var(--accent);
            filter: drop-shadow(0 0 10px var(--accent-glow));
            margin-bottom: 0.75rem;
        }
        .header h1 { font-size: 1.5rem; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 0.25rem; }
        .header p { color: var(--text-muted); font-size: 0.85rem; }

        .step { display: none; }
        .step.active { display: block; animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }

        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; font-size: 0.8rem; font-weight: 600; color: var(--text-muted); margin-bottom: 0.4rem; margin-left: 4px; }
        
        .input-wrapper { position: relative; width: 100%; }
        .input-wrapper input {
            width: 100%; padding: 0.75rem 2.8rem 0.75rem 1rem;
            background: rgba(0, 0, 0, 0.25); border: 1px solid var(--border);
            border-radius: 12px; color: var(--text); font-size: 0.95rem;
            outline: none; transition: 0.2s;
        }
        .input-wrapper input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(0, 240, 255, 0.08); }
        
        .toggle-password {
            position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
            background: none; border: none; color: var(--text-muted);
            cursor: pointer; font-size: 1.1rem; display: flex; align-items: center;
        }

        .otp-group { display: flex; gap: 6px; justify-content: center; margin: 1.5rem 0; }
        .otp-input {
            width: 40px; height: 50px;
            text-align: center; font-size: 1.25rem; font-weight: 700;
            background: rgba(0, 0, 0, 0.3); border: 1px solid var(--border);
            border-radius: 10px; color: var(--accent); outline: none;
        }

        .btn-submit {
            width: 100%; padding: 0.9rem;
            background: linear-gradient(135deg, var(--accent), #00c0ff);
            color: #020617; border: none; border-radius: 12px;
            font-size: 1rem; font-weight: 700; cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 10px 20px -5px rgba(0, 240, 255, 0.3);
        }
        .btn-submit:hover { transform: translateY(-2px); filter: brightness(1.1); }

        .footer-links { margin-top: 1.5rem; text-align: center; font-size: 0.85rem; color: var(--text-muted); }
        .link { color: var(--accent); text-decoration: none; font-weight: 600; }
        .resend-link { display: block; margin-bottom: 0.5rem; }

        .toast {
            position: fixed; top: 24px; right: 24px;
            padding: 1rem 1.5rem; border-radius: 14px; color: white;
            font-weight: 600; z-index: 9999;
            display: flex; align-items: center; gap: 12px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            animation: slideInRight 0.4s ease-out; 
            -webkit-backdrop-filter: blur(10px);
            backdrop-filter: blur(10px);
        }
        .toast-success { background: rgba(16, 185, 129, 0.9); }
        .toast-error { background: rgba(239, 68, 68, 0.9); }

        @keyframes slideInRight { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        .otp-header { margin-bottom: 0.5rem; }
    </style>
</head>
<body>
    <div class="mesh-bg"></div>
    <div class="login-card">
        <div class="header">
            <div class="logo-icon"><i class="fas fa-key"></i></div>
            <h1>Récupération</h1>
            <p>Intelligence CityAlert</p>
        </div>

        <div id="resetStep1" class="step active">
            <form onsubmit="handleResetRequest(event)">
                {% csrf_token %}
                <div class="form-group">
                    <label for="reset_email">Email de récupération</label>
                    <div class="input-wrapper"><input type="email" id="reset_email" placeholder="nom@entreprise.com" required autofocus></div>
                </div>
                <button type="submit" class="btn-submit" id="requestBtn">Générer le code OTP</button>
            </form>
            <div class="footer-links"><a href="{% url 'dashboard:login' %}" class="link">Retour connexion</a></div>
        </div>

        <div id="resetStep2" class="step">
            <div class="header otp-header"><p>Code envoyé par email</p></div>
            <div class="otp-group">
                <input type="text" class="otp-input" maxlength="1" onkeyup="handleOtpInput(this, event)" aria-label="Digit 1">
                <input type="text" class="otp-input" maxlength="1" onkeyup="handleOtpInput(this, event)" aria-label="Digit 2">
                <input type="text" class="otp-input" maxlength="1" onkeyup="handleOtpInput(this, event)" aria-label="Digit 3">
                <input type="text" class="otp-input" maxlength="1" onkeyup="handleOtpInput(this, event)" aria-label="Digit 4">
                <input type="text" class="otp-input" maxlength="1" onkeyup="handleOtpInput(this, event)" aria-label="Digit 5">
                <input type="text" class="otp-input" maxlength="1" onkeyup="handleOtpInput(this, event)" aria-label="Digit 6">
            </div>
            <button type="button" onclick="handleOtpVerify()" class="btn-submit" id="verifyBtn">Vérifier le code</button>
            <div class="footer-links">
                <a href="javascript:void(0)" onclick="resendOtp()" class="link resend-link">Renvoyer</a>
                <a href="javascript:void(0)" onclick="goToStep(1)" class="link">Modifier l'email</a>
            </div>
        </div>

        <div id="resetStep3" class="step">
            <form onsubmit="handleNewPassword(event)">
                {% csrf_token %}
                <div class="form-group">
                    <label for="new_password">Nouveau mot de passe</label>
                    <div class="input-wrapper">
                        <input type="password" id="new_password" placeholder="8 caractères min." required>
                        <button type="button" class="toggle-password" onclick="togglePasswordVisibility('new_password', this)" aria-label="Afficher/Masquer" title="Afficher/Masquer">
                            <i class="far fa-eye"></i>
                        </button>
                    </div>
                </div>
                <div class="form-group">
                    <label for="new_password_confirm">Confirmation</label>
                    <div class="input-wrapper">
                        <input type="password" id="new_password_confirm" placeholder="Confirmez" required>
                        <button type="button" class="toggle-password" onclick="togglePasswordVisibility('new_password_confirm', this)" aria-label="Afficher/Masquer" title="Afficher/Masquer">
                            <i class="far fa-eye"></i>
                        </button>
                    </div>
                </div>
                <button type="submit" class="btn-submit" id="resetBtn">Réinitialiser</button>
            </form>
        </div>
    </div>

    <script>
        function togglePasswordVisibility(id, btn) {
            const input = document.getElementById(id);
            const icon = btn.querySelector('i');
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        }

        let currentEmail = '';
        function goToStep(step) {
            document.querySelectorAll('.step').forEach(el => el.classList.remove('active'));
            document.getElementById(`resetStep${step}`).classList.add('active');
        }
        function handleOtpInput(input, event) {
            if (event.key === "Backspace") { if (input.previousElementSibling) input.previousElementSibling.focus(); }
            else if (input.value.length === 1) { if (input.nextElementSibling) input.nextElementSibling.focus(); }
        }
        async function handleResetRequest(event) {
            event.preventDefault();
            const email = document.getElementById('reset_email').value;
            currentEmail = email;
            const btn = document.getElementById('requestBtn');
            btn.disabled = true; btn.innerHTML = 'Traitement...';
            try {
                const response = await fetch("{% url 'dashboard:password_reset_request' %}", {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded', 'X-CSRFToken': '{{ csrf_token }}' },
                    body: `email=${encodeURIComponent(email)}`
                });
                const data = await response.json();
                if (data.status === 'success') { showToast("Code généré !", "success"); goToStep(2); }
                else { showToast(data.message, "error"); btn.disabled = false; btn.innerHTML = 'Générer'; }
            } catch (e) { showToast("Erreur réseau", "error"); btn.disabled = false; }
        }
        async function handleOtpVerify() {
            const code = Array.from(document.querySelectorAll('.otp-input')).map(i => i.value).join('');
            if (code.length < 6) return showToast("Code incomplet", "error");
            try {
                const response = await fetch("{% url 'dashboard:password_reset_verify' %}", {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded', 'X-CSRFToken': '{{ csrf_token }}' },
                    body: `email=${encodeURIComponent(currentEmail)}&otp=${encodeURIComponent(code)}`
                });
                const data = await response.json();
                if (data.status === 'success') { showToast("Vérifié", "success"); goToStep(3); }
                else showToast("Code invalide", "error");
            } catch (e) { showToast("Erreur système", "error"); }
        }
        async function handleNewPassword(event) {
            event.preventDefault();
            const password = document.getElementById('new_password').value;
            const confirm = document.getElementById('new_password_confirm').value;
            if (password !== confirm) return showToast("Désaccord", "error");
            try {
                const response = await fetch("{% url 'dashboard:password_reset_new' %}", {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded', 'X-CSRFToken': '{{ csrf_token }}' },
                    body: `email=${encodeURIComponent(currentEmail)}&password=${encodeURIComponent(password)}`
                });
                const data = await response.json();
                if (data.status === 'success') { showToast("Restauration OK", "success"); setTimeout(() => window.location.href="{% url 'dashboard:login' %}", 1200); }
                else showToast(data.message, "error");
            } catch (e) { showToast("Erreur système", "error"); }
        }
        function resendOtp() { showToast("Code renvoyé", "success"); handleResetRequest({ preventDefault: () => {} }); }
        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            toast.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-triangle-exclamation'}"></i> ${message}`;
            document.body.appendChild(toast);
            setTimeout(() => { toast.remove(); }, 3000);
        }
    </script>
</body>
</html>
