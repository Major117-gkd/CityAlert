<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    {% load static %}
    <title>Connexion | CityAlert Intelligence</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <style>
        :root {
            --accent: #00f0ff;
            --accent-glow: rgba(0, 240, 255, 0.4);
            --bg: #030712;
            --card-bg: rgba(15, 23, 42, 0.65);
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --border: rgba(255, 255, 255, 0.05);
            --error: #fb7185;
            --success: #10b981;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        .mesh-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: 
                radial-gradient(at 0% 0%, hsla(180, 100%, 50%, 0.05) 0px, transparent 50%),
                radial-gradient(at 100% 100%, hsla(210, 100%, 50%, 0.05) 0px, transparent 50%);
            z-index: -1;
        }

        .login-card {
            width: 100%;
            max-width: 400px;
            padding: 1.75rem 2rem;
            background: var(--card-bg);
            -webkit-backdrop-filter: blur(24px);
            backdrop-filter: blur(24px);
            border: 1px solid var(--border);
            border-radius: 28px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .header { text-align: center; margin-bottom: 1.25rem; }
        .logo-icon { 
            font-size: 2rem; 
            color: var(--accent);
            filter: drop-shadow(0 0 10px var(--accent-glow));
            margin-bottom: 0.75rem;
        }
        .header h1 { font-size: 1.5rem; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 0.25rem; }
        .header p { color: var(--text-muted); font-size: 0.85rem; }

        .social-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 1.25rem; }
        .btn-social {
            padding: 0.65rem;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text);
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 10px;
            transition: 0.2s;
        }
        .btn-social:hover { background: rgba(255, 255, 255, 0.06); transform: translateY(-1px); }
        .btn-social img { width: 18px; height: 18px; }

        .divider {
            display: flex; align-items: center; margin-bottom: 1.25rem;
            color: var(--text-muted); font-size: 0.7rem; font-weight: 600;
            text-transform: uppercase; letter-spacing: 0.1em;
        }
        .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
        .divider::before { margin-right: 12px; }
        .divider::after { margin-left: 12px; }

        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; font-size: 0.8rem; font-weight: 600; color: var(--text-muted); margin-bottom: 0.4rem; margin-left: 4px; }
        
        .input-wrapper { position: relative; width: 100%; }
        .input-wrapper input {
            width: 100%; padding: 0.75rem 2.8rem 0.75rem 1rem;
            background: rgba(0, 0, 0, 0.25); border: 1px solid var(--border);
            border-radius: 12px; color: var(--text); font-size: 0.95rem;
            outline: none; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .input-wrapper input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(0, 240, 255, 0.08); }
        
        .toggle-password {
            position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
            background: none; border: none; color: var(--text-muted);
            cursor: pointer; font-size: 1.1rem; padding: 4px;
            display: flex; align-items: center; justify-content: center;
        }

        .error-alert {
            background: rgba(251, 113, 133, 0.1);
            border: 1px solid var(--error);
            color: var(--error);
            padding: 8px;
            border-radius: 10px;
            margin-bottom: 1rem;
            font-size: 0.75rem;
            text-align: center;
        }

        .form-footer { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.25rem; font-size: 0.8rem; }
        .remember-me { display: flex; align-items: center; gap: 6px; color: var(--text-muted); cursor: pointer; }
        .remember-me input { accent-color: var(--accent); width: 14px; height: 14px; }
        .forgot-link { color: var(--accent); text-decoration: none; font-weight: 600; }

        .btn-submit {
            width: 100%; padding: 0.9rem;
            background: linear-gradient(135deg, var(--accent), #00c0ff);
            color: #020617; border: none; border-radius: 12px;
            font-size: 1rem; font-weight: 700; cursor: pointer;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 20px -5px rgba(0, 240, 255, 0.3);
        }
        .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 15px 30px -5px rgba(0, 240, 255, 0.4); }

        .register-footer { margin-top: 1.5rem; text-align: center; font-size: 0.85rem; color: var(--text-muted); }
        .register-link { color: var(--text); text-decoration: none; font-weight: 700; margin-left: 0.3rem; }

        .security-badge {
            margin-top: 1.5rem; display: flex; align-items: center; justify-content: center;
            gap: 6px; font-size: 0.7rem; color: var(--text-muted); opacity: 0.6;
        }
        .security-badge i { color: var(--success); }
    </style>
</head>
<body>
    <div class="mesh-bg"></div>
    <div class="login-card">
        <div class="header">
            <div class="logo-icon"><i class="fas fa-shield-halved"></i></div>
            <h1>Bienvenue</h1>
            <p>Intelligence Urbaine CityAlert</p>
        </div>

        <div class="social-grid">
            <button class="btn-social" title="Se connecter avec Google">
                <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" alt="Google">
                Google
            </button>
            <button class="btn-social" title="Se connecter avec Apple">
                <i class="fab fa-apple"></i> 
                Apple
            </button>
        </div>

        <div class="divider"><span>ou email</span></div>

        <form method="post" novalidate>
            {% csrf_token %}
            {% if form.non_field_errors %}
            <div class="error-alert">
                {{ form.non_field_errors }}
            </div>
            {% endif %}

            <div class="form-group">
                <label for="id_username">Email professionnel</label>
                <div class="input-wrapper">
                    <input type="email" name="username" id="id_username" placeholder="nom@exemple.com" required autofocus>
                </div>
            </div>

            <div class="form-group">
                <label for="id_password">Mot de passe</label>
                <div class="input-wrapper">
                    <input type="password" name="password" id="id_password" placeholder="••••••••" required>
                    <button type="button" class="toggle-password" onclick="togglePasswordVisibility('id_password', this)" aria-label="Afficher/Masquer le mot de passe" title="Afficher/Masquer le mot de passe">
                        <i class="far fa-eye"></i>
                    </button>
                </div>
            </div>

            <div class="form-footer">
                <label class="remember-me"><input type="checkbox" name="remember_me"> Se souvenir</label>
                <a href="{% url 'dashboard:password_reset_request' %}" class="forgot-link">Oublié ?</a>
            </div>

            <button type="submit" class="btn-submit">Se connecter</button>
        </form>

        <div class="register-footer">
            Nouveau ? <a href="{% url 'dashboard:register' %}" class="register-link">S'inscrire</a>
        </div>

        <div class="security-badge"><i class="fas fa-lock"></i> Connexion sécurisée CityAlert</div>
    </div>

    <script>
        function togglePasswordVisibility(id, btn) {
            const input = document.getElementById(id);
            const icon = btn.querySelector('i');
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        }
    </script>
</body>
</html>
