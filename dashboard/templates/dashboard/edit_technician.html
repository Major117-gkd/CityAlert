{% extends 'dashboard/base.html' %}

{% block header_title %}{% endblock %}
{% block header_subtitle %}{% endblock %}

{% block content %}
<div class="glass-card" style="max-width: 600px; margin: 0 auto; padding: 2.5rem; border-radius: 20px;">
    <form method="POST">
        {% csrf_token %}
        <div style="display: grid; gap: 1.5rem;">
            
            <div class="form-group">
                <label style="display: block; margin-bottom: 0.5rem; color: var(--text-muted); font-size: 0.85rem; text-transform: uppercase;">Nom Complet</label>
                <input type="text" name="name" value="{{ technician.name }}" required style="width: 100%; padding: 1rem; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; color: white;">
            </div>
            
            <div class="form-group">
                <label style="display: block; margin-bottom: 0.5rem; color: var(--text-muted); font-size: 0.85rem; text-transform: uppercase;">Équipe / Catégorie</label>
                <select name="category" style="width: 100%; padding: 1rem; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; color: white;">
                    <option value="Eau" {% if technician.category == 'Eau' %}selected{% endif %} style="color: black;">Fuite d'eau</option>
                    <option value="Accident" {% if technician.category == 'Accident' %}selected{% endif %} style="color: black;">Accident de la route</option>
                    <option value="Electricité" {% if technician.category == 'Electricité' %}selected{% endif %} style="color: black;">Court-circuit / Panne</option>
                </select>
            </div>
            
            <div class="form-group">
                <label style="display: block; margin-bottom: 0.5rem; color: var(--text-muted); font-size: 0.85rem; text-transform: uppercase;">Spécialité</label>
                <input type="text" name="specialty" value="{{ technician.specialty }}" required style="width: 100%; padding: 1rem; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; color: white;">
            </div>
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                <div class="form-group">
                    <label style="display: block; margin-bottom: 0.5rem; color: var(--text-muted); font-size: 0.85rem; text-transform: uppercase;">Téléphone</label>
                    <input type="text" name="phone" value="{{ technician.phone|default:'' }}" style="width: 100%; padding: 1rem; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; color: white;">
                </div>
                <div class="form-group">
                    <label style="display: block; margin-bottom: 0.5rem; color: var(--text-muted); font-size: 0.85rem; text-transform: uppercase;">Email</label>
                    <input type="email" name="email" value="{{ technician.email|default:'' }}" style="width: 100%; padding: 1rem; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; color: white;">
                </div>
            </div>
            
            <div style="display: flex; gap: 1rem; margin-top: 1rem;">
                <button type="submit" style="flex: 1; padding: 1rem; background: var(--accent-orange); color: white; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; transition: 0.3s;" onmouseover="this.style.opacity='0.9'" onmouseout="this.style.opacity='1'">
                    <i class="fas fa-save" style="margin-right: 8px;"></i> Enregistrer
                </button>
                <a href="{% url 'dashboard:technician_list' %}" style="padding: 1rem 2rem; background: rgba(255,255,255,0.1); color: white; border-radius: 12px; text-decoration: none; font-weight: 600; display: flex; align-items: center;">Annuler</a>
            </div>
            
        </div>
    </form>
</div>
{% endblock %}
