{% extends 'dashboard/base.html' %}

{% block header_title %}Succès{% endblock %}

{% block content %}
<div class="glass-card" style="max-width: 500px; margin: 4rem auto; padding: 3rem; text-align: center;">
    <div style="width: 80px; height: 80px; background: rgba(34, 197, 94, 0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 2rem;">
        <i class="fas fa-check-double" style="font-size: 2.5rem; color: #22c55e;"></i>
    </div>
    <h2 style="color: white; margin-bottom: 1rem;">Mot de passe modifié !</h2>
    <p style="color: var(--text-muted); line-height: 1.6; margin-bottom: 2rem;">
        Votre mot de passe a été mis à jour avec succès. Vous pouvez maintenant vous connecter avec vos nouveaux identifiants.
    </p>
    <a href="{% url 'dashboard:login' %}" class="glass-card" style="display: inline-block; padding: 1rem 3rem; background: var(--accent-orange); color: white; text-decoration: none; border-radius: 12px; font-weight: 600; transition: 0.3s;">
        Se connecter <i class="fas fa-sign-in-alt" style="margin-left: 10px;"></i>
    </a>
</div>
{% endblock %}
