<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    {% load static %}
    <title>Inscription | CityAlert Intelligence</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <style>
        :root {
            --accent: #00f0ff;
            --accent-glow: rgba(0, 240, 255, 0.4);
            --bg: #030712;
            --card-bg: rgba(15, 23, 42, 0.65);
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --border: rgba(255, 255, 255, 0.05);
            --error: #fb7185;
            --success: #10b981;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        .mesh-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: 
                radial-gradient(at 100% 0%, hsla(180, 100%, 50%, 0.05) 0px, transparent 50%),
                radial-gradient(at 0% 100%, hsla(210, 100%, 50%, 0.05) 0px, transparent 50%);
            z-index: -1;
        }

        .login-card {
            width: 100%;
            max-width: 400px;
            padding: 1.75rem 2rem;
            background: var(--card-bg);
            -webkit-backdrop-filter: blur(24px);
            backdrop-filter: blur(24px);
            border: 1px solid var(--border);
            border-radius: 28px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .header { text-align: center; margin-bottom: 1.25rem; }
        .logo-icon { 
            font-size: 2rem; 
            color: var(--accent);
            filter: drop-shadow(0 0 10px var(--accent-glow));
            margin-bottom: 0.75rem;
        }
        .header h1 { font-size: 1.5rem; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 0.25rem; }
        .header p { color: var(--text-muted); font-size: 0.85rem; }

        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; font-size: 0.8rem; font-weight: 600; color: var(--text-muted); margin-bottom: 0.4rem; margin-left: 4px; }
        
        .input-wrapper { position: relative; width: 100%; }
        .input-wrapper input {
            width: 100%; padding: 0.75rem 2.8rem 0.75rem 1rem;
            background: rgba(0, 0, 0, 0.25); border: 1px solid var(--border);
            border-radius: 12px; color: var(--text); font-size: 0.95rem;
            outline: none; transition: 0.2s;
        }
        .input-wrapper input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(0, 240, 255, 0.08); }
        
        .toggle-password {
            position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
            background: none; border: none; color: var(--text-muted);
            cursor: pointer; font-size: 1.1rem; display: flex; align-items: center;
        }

        .btn-submit {
            width: 100%; padding: 0.9rem;
            background: linear-gradient(135deg, var(--accent), #00c0ff);
            color: #020617; border: none; border-radius: 12px;
            font-size: 1rem; font-weight: 700; cursor: pointer;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 20px -5px rgba(0, 240, 255, 0.3);
            margin-top: 0.5rem;
        }
        .btn-submit:hover { transform: translateY(-2px); filter: brightness(1.1); }
        .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }

        .footer-links { margin-top: 1.5rem; text-align: center; font-size: 0.85rem; color: var(--text-muted); }
        .link { color: var(--text); text-decoration: none; font-weight: 700; margin-left: 0.3rem; }

        .toast {
            position: fixed; top: 24px; right: 24px;
            padding: 1rem 1.5rem; border-radius: 14px; color: white;
            font-weight: 600; z-index: 9999;
            display: flex; align-items: center; gap: 12px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            animation: slideInRight 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            -webkit-backdrop-filter: blur(10px);
            backdrop-filter: blur(10px);
        }
        @keyframes slideInRight { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes slideOutRight { from { transform: translateX(0); opacity: 1; } to { transform: translateX(100%); opacity: 0; } }
    </style>
</head>
<body>
    <div class="mesh-bg"></div>
    <div class="login-card">
        <div class="header">
            <div class="logo-icon"><i class="fas fa-user-plus"></i></div>
            <h1>Créer un compte</h1>
            <p>Accès CityAlert Intelligence</p>
        </div>

        <form onsubmit="handleRegister(event)">
            {% csrf_token %}
            
            <div class="form-group">
                <label for="reg_email">Email professionnel</label>
                <div class="input-wrapper"><input type="email" id="reg_email" placeholder="nom@entreprise.com" required autofocus></div>
            </div>

            <div class="form-group">
                <label for="reg_password">Mot de passe</label>
                <div class="input-wrapper">
                    <input type="password" id="reg_password" placeholder="8 caractères min." required>
                    <button type="button" class="toggle-password" onclick="togglePasswordVisibility('reg_password', this)" aria-label="Afficher/Masquer" title="Afficher/Masquer">
                        <i class="far fa-eye"></i>
                    </button>
                </div>
            </div>

            <div class="form-group">
                <label for="reg_password_confirm">Confirmation</label>
                <div class="input-wrapper">
                    <input type="password" id="reg_password_confirm" placeholder="Répétez le mot de passe" required>
                    <button type="button" class="toggle-password" onclick="togglePasswordVisibility('reg_password_confirm', this)" aria-label="Afficher/Masquer" title="Afficher/Masquer">
                        <i class="far fa-eye"></i>
                    </button>
                </div>
            </div>

            <button type="submit" class="btn-submit" id="registerBtn">Créer mon accès</button>
        </form>

        <div class="footer-links">
            Déjà membre ? <a href="{% url 'dashboard:login' %}" class="link">Se connecter</a>
        </div>
    </div>

    <script>
        function togglePasswordVisibility(id, btn) {
            const input = document.getElementById(id);
            const icon = btn.querySelector('i');
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        }

        async function handleRegister(event) {
            event.preventDefault();
            const email = document.getElementById('reg_email').value;
            const password = document.getElementById('reg_password').value;
            const password_confirm = document.getElementById('reg_password_confirm').value;
            if (password !== password_confirm) return showToast("Mots de passe différents.", "error");

            const btn = document.getElementById('registerBtn');
            btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Traitement...';

            try {
                const response = await fetch("{% url 'dashboard:register' %}", {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'X-CSRFToken': '{{ csrf_token }}' },
                    body: JSON.stringify({ email, password })
                });
                const data = await response.json();
                if (data.status === 'success') {
                    showToast("Compte créé !", "success");
                    setTimeout(() => window.location.href = "{% url 'dashboard:dashboard_index' %}", 1200);
                } else {
                    showToast(data.message || "Erreur système", "error");
                    btn.disabled = false; btn.innerHTML = 'Créer mon accès';
                }
            } catch (error) {
                showToast("Erreur de connexion", "error");
                btn.disabled = false; btn.innerHTML = 'Créer mon accès';
            }
        }

        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.style.background = type === 'success' ? 'rgba(16, 185, 129, 0.9)' : 'rgba(239, 68, 68, 0.9)';
            toast.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-triangle-exclamation'}"></i> ${message}`;
            document.body.appendChild(toast);
            setTimeout(() => {
                toast.style.animation = 'slideOutRight 0.4s forwards';
                setTimeout(() => toast.remove(), 400);
            }, 3000);
        }
    </script>
</body>
</html>
